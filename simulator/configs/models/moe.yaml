models:
  mixtral_8x7b:
    display_name: "Mixtral-8x7B"
    family: "mixtral"
    kind: "moe"
    num_layers: 32
    hidden_size: 4096
    num_attention_heads: 32
    num_kv_heads: 8
    head_dim: 128
    num_experts: 8
    num_experts_per_tok: 2
    ops:
      - {type: sfu, name: sfu_rmsnorm, op_type: rmsnorm, dim: 4096, nbits: 16}
      - {type: fc, name: fc_q_proj, output_dim: 4096, input_dim: 4096}
      - {type: fc, name: fc_k_proj, output_dim: 1024, input_dim: 4096}
      - {type: fc, name: fc_v_proj, output_dim: 1024, input_dim: 4096}
      - {type: attention, name: attention, dim: 4096, num_attention_heads: 32, num_kv_heads: 8, head_dim: 128}
      - {type: fc, name: fc_o_proj, output_dim: 4096, input_dim: 4096}
      - {type: sfu, name: sfu_rmsnorm_2, op_type: rmsnorm, dim: 4096, nbits: 16}
      - {type: fc, name: fc_gate_proj, output_dim: 14336, input_dim: 4096, is_expert: true}
      - {type: fc, name: fc_up_proj, output_dim: 14336, input_dim: 4096, is_expert: true}
      - {type: sfu, name: sfu_swiglu, op_type: swiglu, dim: 14336, nbits: 16, is_expert: true}
      - {type: fc, name: fc_down_proj, output_dim: 4096, input_dim: 14336, is_expert: true}
  qwen3_30b_a3b:
    display_name: "Qwen3-30B-A3B"
    family: "qwen3"
    kind: "moe"
    num_layers: 48
    hidden_size: 2048
    num_attention_heads: 32
    num_kv_heads: 4
    head_dim: 128
    num_experts: 128
    num_experts_per_tok: 8
    shared_expert: true
    shared_expert_intermediate_size: 6144
    ops:
      - {type: sfu, name: sfu_rmsnorm, op_type: rmsnorm, dim: 2048, nbits: 16}
      - {type: fc, name: fc_q_proj, output_dim: 4096, input_dim: 2048}
      - {type: fc, name: fc_k_proj, output_dim: 512, input_dim: 2048}
      - {type: fc, name: fc_v_proj, output_dim: 512, input_dim: 2048}
      - {type: attention, name: attention, dim: 4096, num_attention_heads: 32, num_kv_heads: 4, head_dim: 128}
      - {type: fc, name: fc_o_proj, output_dim: 2048, input_dim: 4096}
      - {type: sfu, name: sfu_rmsnorm_2, op_type: rmsnorm, dim: 2048, nbits: 16}
      - {type: fc, name: fc_gate_proj, output_dim: 768, input_dim: 2048, is_expert: true}
      - {type: fc, name: fc_up_proj, output_dim: 768, input_dim: 2048, is_expert: true}
      - {type: sfu, name: sfu_swiglu, op_type: swiglu, dim: 768, nbits: 16, is_expert: true}
      - {type: fc, name: fc_down_proj, output_dim: 2048, input_dim: 768, is_expert: true}
      - {type: sfu, name: sfu_swiglu_shared, op_type: swiglu, dim: 6144, nbits: 16}
