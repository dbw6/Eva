studies:
  fig11_batch:
    description: "Reproduce batch-size scaling by modeling batch as sequence_length / M."
    phase: decode
    ops_mode: fc_only
    models:
      - llama_2_7b
    methods:
      - systolic_array
      - ant
      - figna
      - figlut_4
      - vqarray_2_prefill
      - vqarray_2_decode
      - vqarray_3_decode
      - vqarray_4_decode
    sequence_lengths: [1]
    batch_sizes: [1, 2, 4, 8, 16, 32, 64, 1024]
    aggregate_sequence1: false
    output_subdir: fig11_batch
