studies:
  fig8_dse:
    description: "Reproduce the EVA DSE sweeps for Fig. 8 (decode EU/bandwidth + prefill bandwidth)."
    phase: decode
    ops_mode: fc_only
    models:
      - llama_2_7b
    methods:
      - vqarray_2_decode
      - vqarray_3_decode
      - vqarray_4_decode
    sequence_lengths: [1]
    batch_sizes: [1]
    aggregate_sequence1: false
    output_subdir: fig8_dse
    extra:
      scenario: both
      decode_methods:
        - vqarray_2_decode
        - vqarray_3_decode
        - vqarray_4_decode
      prefill_methods:
        - vqarray_2_prefill
      prefill_sequence_length: 1024
      memory_bandwidth_values: [256, 512, 768, 1024, 1280, 1536, 1792, 2048]
      adder_tree_sizes: [32, 64, 128, 256, 512]
      default_mem_width: 1024
      default_adder_tree_size: 128
      paper_figure_method: vqarray_2_decode
      paper_figure_label: EVA-W2
      paper_prefill_method: vqarray_2_prefill
