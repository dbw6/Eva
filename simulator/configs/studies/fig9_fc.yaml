studies:
  fig9_fc:
    description: "Reproduce the Figure 9 FC-only decoding results at sequence_length=1."
    phase: decode
    ops_mode: fc_only
    models:
      - llama_7b
      - llama_13b
      - llama_30b
      - llama_65b
      - llama_2_7b
      - llama_2_13b
      - llama3_8b
    methods:
      - systolic_array
      - ant
      - figna
      - figlut_4
      - vqarray_2_decode
      - vqarray_3_decode
      - vqarray_4_decode
    sequence_lengths: [1]
    batch_sizes: [1]
    aggregate_sequence1: true
    output_subdir: fig9_fc
    extra:
      reference_drop_methods:
        - figlut_2
